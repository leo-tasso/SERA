name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Builds the SERA control-room desktop app into installable packages and
# attaches them to a GitHub Release. Triggered by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install UI dependencies
        # Not `npm ci`: the committed lockfile predates the electron-builder
        # devDependency. Run `npm install` in ui/ locally and commit the updated
        # ui/package-lock.json to switch this back to `npm ci`.
        run: npm install

      - name: Build installers
        # electron-builder reads the per-OS targets from package.json "build".
        run: npx --no-install electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sera-${{ matrix.os }}
          path: |
            ui/dist/*.exe
            ui/dist/*.AppImage
            ui/dist/*.deb
            ui/dist/*.dmg
            ui/dist/*.zip
          if-no-files-found: warn

  publish:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SERA ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
          body: |
            Automated desktop build of the SERA control-room UI.

            **Runtime prerequisite:** the app spawns the Python backend
            (`backend_bridge.py`), so the target machine needs Python 3.11+
            with the project dependencies installed (`pip install -e .`).
            The Python sources, trained twin, data, and GeoJSON are bundled
            inside the package; only the interpreter must be present.
