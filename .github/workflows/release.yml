name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Builds the SERA control-room desktop app into installable packages and
# attaches them to a GitHub Release. Triggered by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install UI dependencies
        # Not `npm ci`: the committed lockfile predates the electron-builder
        # devDependency. Run `npm install` in ui/ locally and commit the updated
        # ui/package-lock.json to switch this back to `npm ci`.
        run: npm install

      - name: Set version from tag
        # The installer name comes from electron-builder's ${version}, read from
        # package.json. Rewrite it from the tag (vX.Y.Z -> X.Y.Z) so artifacts
        # track the release tag. No-op for manual workflow_dispatch (no tag).
        # `bash` is available on every runner (incl. Windows) so this is portable.
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version=process.argv[1];fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')" "$VERSION"
            echo "Set package.json version to $VERSION"
          fi

      - name: Build installers
        # electron-builder reads the per-OS targets from package.json "build".
        run: npx --no-install electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sera-${{ matrix.os }}
          path: |
            ui/dist/*.exe
            ui/dist/*.AppImage
            ui/dist/*.deb
            ui/dist/*.dmg
            ui/dist/*.zip
          if-no-files-found: warn

  publish:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      # Uses the preinstalled GitHub CLI (no Node.js runtime) rather than a
      # third-party action, so nothing here depends on a deprecated Node version.
      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          shopt -s globstar nullglob
          files=(artifacts/**/*)
          printf '%s\n' \
            'Automated desktop build of the SERA control-room UI.' \
            '' \
            '**Runtime prerequisite:** the app spawns the Python backend' \
            '(`backend_bridge.py`), so the target machine needs Python 3.11+' \
            'with the project dependencies installed (`pip install -e .`).' \
            'The Python sources, trained twin, data, and GeoJSON are bundled' \
            'inside the package; only the interpreter must be present.' > notes.md
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "${files[@]}" --repo "$REPO" --clobber
          else
            gh release create "$TAG" "${files[@]}" --repo "$REPO" \
              --title "SERA $TAG" --notes-file notes.md
          fi
