name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite
        # backend_bridge.py inserts src/ on sys.path and test_bridge_budget.py
        # inserts ui/, so no extra PYTHONPATH is required.
        run: pytest -q --cov=sera --cov-report=term --cov-report=xml --junitxml=junit.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage.xml
            junit.xml
          if-no-files-found: ignore

  lint:
    name: lint (ruff + black)
    runs-on: ubuntu-latest
    # Style issues report but do not fail the pipeline; flip to false to enforce.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.1.0" "black>=23.0.0"

      - name: ruff
        run: ruff check src tests

      - name: black --check
        run: black --check src tests
