# GitLab CI/CD for SERA.
#   * test  -> runs the pytest suite on every push / merge request.
#   * release -> on a version tag (vX.Y.Z) builds the Linux desktop installers
#                with electron-builder and publishes a GitLab Release.
#
# GitLab shared runners are Linux, so this packages the Linux targets
# (AppImage + deb). Windows/macOS installers are produced by the GitHub
# Actions `release` workflow's build matrix.

stages:
  - test
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

pytest:
  stage: test
  image: python:3.11
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"
    # backend_bridge.py / test_bridge_budget.py manage their own sys.path.
    - pytest -q --cov=sera --cov-report=term --junitxml=junit.xml
  coverage: '/^TOTAL.+?(\d+\%)$/'
  artifacts:
    when: always
    reports:
      junit: junit.xml
    expire_in: 1 week

package-linux:
  stage: release
  image: electronuserland/builder:18
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  script:
    - cd ui
    - npm install
    - npx --no-install electron-builder --linux AppImage deb --publish never
  artifacts:
    paths:
      - ui/dist/*.AppImage
      - ui/dist/*.deb
    expire_in: 30 days

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: ["package-linux"]
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  script:
    - echo "Publishing GitLab Release for $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "SERA $CI_COMMIT_TAG"
    description: |
      Automated Linux desktop build of the SERA control-room UI.
      Installers (AppImage, deb) are attached as artifacts of the
      `package-linux` job for this pipeline.

      Runtime prerequisite: Python 3.11+ with project dependencies
      (`pip install -e .`); the Python backend, trained twin, data and
      GeoJSON are bundled inside the package.
