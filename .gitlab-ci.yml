# GitLab CI/CD for SERA.
#   * test  -> runs the pytest suite on every push / merge request.
#   * release -> on a version tag (vX.Y.Z) builds the Linux desktop installers
#                with electron-builder and publishes a GitLab Release.
#
# GitLab shared runners are Linux, so this packages the Linux targets
# (AppImage + deb). Windows/macOS installers are produced by the GitHub
# Actions `release` workflow's build matrix.

stages:
  - test
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

pytest:
  stage: test
  image: python:3.11
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"
    # backend_bridge.py / test_bridge_budget.py manage their own sys.path.
    - pytest -q --cov=sera --cov-report=term --junitxml=junit.xml
  coverage: '/^TOTAL.+?(\d+\%)$/'
  artifacts:
    when: always
    reports:
      junit: junit.xml
    expire_in: 1 week

package-linux:
  stage: release
  image: electronuserland/builder:18
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  script:
    # Freeze the Python backend into a self-contained executable so the released
    # app needs no system Python. The electronuserland/builder image is Debian-
    # based; install a Python toolchain in an isolated venv (PEP 668 blocks the
    # system pip) and run PyInstaller from the repo root. electron-builder then
    # bundles ui/pydist/backend_bridge via "extraResources" in package.json.
    - apt-get update -qq && apt-get install -y -qq python3 python3-venv python3-pip
    - python3 -m venv /tmp/pybuild
    - . /tmp/pybuild/bin/activate
    - pip install --upgrade pip
    - pip install -e ".[build]"
    - pyinstaller --noconfirm --clean --distpath "$CI_PROJECT_DIR/ui/pydist" backend_bridge.spec
    - deactivate
    - cd ui
    - npm install
    # The installer name comes from electron-builder's ${version}, which it reads
    # from package.json. Rewrite it to the tag (vX.Y.Z -> X.Y.Z) so the artifacts
    # track the release tag instead of the hard-coded package.json value.
    - VERSION="${CI_COMMIT_TAG#v}"
    - node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version=process.argv[1];fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')" "$VERSION"
    - npx --no-install electron-builder --linux AppImage deb --publish never
    # Job artifacts have a hard size cap on this instance and the Electron
    # installers blow past it (413 Too Large), so the binaries go to the generic
    # Package Registry; only their filenames are passed on (via dotenv) so the
    # release job can link to them.
    - |
      cd dist
      : > "$CI_PROJECT_DIR/build.env"
      for f in *.AppImage *.deb; do
        [ -e "$f" ] || continue
        echo "Uploading $f to the package registry..."
        curl --fail --silent --show-error \
          --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --upload-file "$f" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/sera/${CI_COMMIT_TAG}/${f}"
        case "$f" in
          *.AppImage) echo "APPIMAGE_NAME=$f" >> "$CI_PROJECT_DIR/build.env" ;;
          *.deb)      echo "DEB_NAME=$f"      >> "$CI_PROJECT_DIR/build.env" ;;
        esac
      done
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 1 week

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: package-linux
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
  script:
    - echo "Publishing GitLab Release for $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "SERA $CI_COMMIT_TAG"
    description: |
      Automated Linux desktop build of the SERA control-room UI.
      Download the installers from the assets below (hosted in the project
      Package Registry).

      Self-contained: the Python backend is bundled as a frozen executable,
      so no Python installation is required. The trained twin, data and
      GeoJSON are bundled inside the package. Windows/macOS installers are
      produced by the GitHub Actions release workflow.
    assets:
      links:
        - name: "$APPIMAGE_NAME (Linux x86_64 AppImage)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/sera/${CI_COMMIT_TAG}/${APPIMAGE_NAME}"
        - name: "$DEB_NAME (Linux x86_64 .deb)"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/sera/${CI_COMMIT_TAG}/${DEB_NAME}"
